<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illuminated By Artistry</title>
    
    <!-- Styles and Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'gold': '#FFD700',
                        'light-bg': '#FFFFFF',
                        'light-text': '#1f2937',
                        'dark-bg': '#111827',
                        'dark-text': '#f9fafb',
                        'dark-card': '#1f2937',
                    },
                    fontFamily: {
                        'playfair': ['"Playfair Display"', 'serif'],
                        'raleway': ['Raleway', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Raleway', sans-serif; }
        .heading-font { font-family: 'Playfair Display', serif; }
        
        /* Dropdown menu styles - ensure dropdowns stay visible */
        .dropdown-wrapper {
            position: relative;
        }
        .dropdown-menu {
            position: absolute;
            left: 0;
            margin-top: 0.5rem;
            width: 12rem;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border-radius: 0.375rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            padding-top: 0.25rem;
            padding-bottom: 0.25rem;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
            z-index: 10;
        }
        .dark .dropdown-menu {
            background-color: rgba(31, 41, 55, 0.95);
        }
        .dropdown-wrapper:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        /* Custom styles for intl-tel-input in dark mode */
        .dark .iti__country-list {
            background-color: #1f2937; /* dark-card */
            border: 1px solid #4b5563; /* gray-600 */
        }
        .dark .iti__country {
            color: #f9fafb; /* dark-text */
        }
        .dark .iti__country.iti__highlight {
            background-color: #374151; /* gray-700 */
        }
        .dark .iti__dial-code {
            color: #9ca3af; /* gray-400 */
        }
    </style>
</head>

            <a href="index.html" class="text-2xl heading-font text-gold">Illuminated By Artistry</a>
            
            <!-- Desktop Menu -->
            <div class="hidden lg:flex items-center space-x-8">
                <a href="index.html" class="hover:text-gold transition-colors">Home</a>
                
                <!-- Shop Dropdown -->
                <div class="dropdown-wrapper">
                    <button class="hover:text-gold transition-colors flex items-center">
                        Shop <i data-feather="chevron-down" class="w-4 h-4 ml-1"></i>
                    </button>
                    <div class="dropdown-menu">
                        <a href="products_page.html" class="block px-4 py-2 text-sm hover:bg-gray-200 dark:hover:bg-gray-700">Products</a>
                        <a href="services_page.html" class="block px-4 py-2 text-sm hover:bg-gray-200 dark:hover:bg-gray-700">Services</a>
                    </div>
                </div>

                <!-- Explore Dropdown -->
                <div class="dropdown-wrapper">
                    <button class="hover:text-gold transition-colors flex items-center">
                        Explore <i data-feather="chevron-down" class="w-4 h-4 ml-1"></i>
                    </button>
                    <div class="dropdown-menu">
                        <a href="gallery_page.html" class="block px-4 py-2 text-sm hover:bg-gray-200 dark:hover:bg-gray-700">Gallery</a>
                        <a href="tattoo_viewer.html" class="block px-4 py-2 text-sm hover:bg-gray-200 dark:hover:bg-gray-700">3D Tattoo Viewer</a>
                    </div>
                </div>

                <a href="about.html" class="hover:text-gold transition-colors">About</a>
                <a href="contact.html" class="hover:text-gold transition-colors">Contact</a>
            </div>

            <div class="hidden lg:flex items-center space-x-4" id="nav-auth-links">
                <span id="greeting-message" class="text-sm font-medium text-gray-700 dark:text-gray-300" style="display: none;"></span>
                <button class="theme-toggle-btn hover:text-gold transition-colors">
                    <i data-feather="sun" class="hidden dark:block"></i>
                    <i data-feather="moon" class="block dark:hidden"></i>
                </button>
                <a href="admin-dashboard.html" class="hover:text-gold transition-colors" id="admin-icon" title="Admin Dashboard" style="display: none;">
                    <i data-feather="edit"></i>
                </a>
                <a href="login_page.html" class="hover:text-gold transition-colors" id="login-icon" title="Login">
                    <i data-feather="user"></i>
                </a>
                <a href="account_page.html" class="hover:text-gold transition-colors" id="account-icon" title="My Account" style="display: none;">

            <!-- Mobile Menu Button -->

                <button id="mobile-menu-button" class="focus:outline-none">

                </button>
            </div>
        </div>

                </div>
            </div>
        </div>
    </nav>

    <script>
        function toggleMobileSubmenu(submenuId) {
            const submenu = document.getElementById(submenuId);
            if (submenu) {
                submenu.classList.toggle('hidden');
            }
        }

        // Check authentication status and update header icons
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Checking session status...');
            
            fetch('api/session_status.html')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Session data:', data);
                    
                    const greetingMessage = document.getElementById('greeting-message');
                    const mobileGreeting = document.getElementById('mobile-greeting');
                    const logoutIcon = document.getElementById('logout-icon');
                    const logoutIconMobile = document.getElementById('logout-icon-mobile');
                    const adminIcon = document.getElementById('admin-icon');
                    const adminIconMobile = document.getElementById('admin-icon-mobile');
                    const accountIcon = document.getElementById('account-icon');
                    const accountIconMobile = document.getElementById('account-icon-mobile');
                    const ordersIcon = document.getElementById('orders-icon');
                    const ordersIconMobile = document.getElementById('orders-icon-mobile');
                    const loginIcon = document.getElementById('login-icon');
                    const loginIconMobile = document.getElementById('login-icon-mobile');
                    
                    if (data.loggedIn) {
                        console.log('User is logged in');
                        
                        // Display greeting message with username
                        const username = data.first_name || data.username || 'User';
                        console.log('Displaying greeting for:', username);
                        
                        if (greetingMessage) {
                            greetingMessage.textContent = `Greetings, ${username}`;
                            greetingMessage.style.display = 'inline-block';
                        }
                        if (mobileGreeting) {
                            mobileGreeting.textContent = `Greetings, ${username}`;
                            mobileGreeting.style.display = 'block';
                        }
                        
                        // Show logout icon for logged-in users
                        if (logoutIcon) {
                            logoutIcon.style.display = 'inline-block';
                        }
                        if (logoutIconMobile) {
                            logoutIconMobile.style.display = 'inline-block';
                        }
                        
                        // Show account icon for logged-in users
                        if (accountIcon) {
                            accountIcon.style.display = 'inline-block';
                        }
                        if (accountIconMobile) {
                            accountIconMobile.style.display = 'inline-block';
                        }
                        
                        // Show orders icon for logged-in users
                        if (ordersIcon) {
                            ordersIcon.style.display = 'inline-block';
                        }
                        if (ordersIconMobile) {
                            ordersIconMobile.style.display = 'inline-block';
                        }
                        
                        // Hide login icon for logged-in users
                        if (loginIcon) {
                            loginIcon.style.display = 'none';
                        }
                        if (loginIconMobile) {
                            loginIconMobile.style.display = 'none';
                        }
                        
                        // Show admin icon if user is admin
                        if (data.role === 'admin') {
                            console.log('User is admin, showing admin icon');
                            if (adminIcon) {
                                adminIcon.style.display = 'inline-block';
                            }
                            if (adminIconMobile) {
                                adminIconMobile.style.display = 'inline-block';
                            }
                        }
                    } else {
                        console.log('User is not logged in');
                    }
                    
                    // Initialize feather icons only once after all updates
                    if (typeof feather !== 'undefined') {
                        feather.replace();
                    }
                })
                .catch(error => {
                    console.error('Error checking session:', error);
                    // Still initialize icons even if session check fails
                    if (typeof feather !== 'undefined') {
                        feather.replace();
                    }
                });

            // Mobile menu toggle
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');

            if (mobileMenuButton && mobileMenu) {
                mobileMenuButton.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                });
            }
        });
    </script>
    <script src="js/cart.js"></script>
