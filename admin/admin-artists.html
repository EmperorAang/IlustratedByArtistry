<!-- 
ADMIN PAGE TEMPLATE
Use this template for all admin pages in the admin/ folder
Admin pages are protected with client-side authentication check
-->
<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Illuminated By Artistry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'gold': '#FFD700',
                        'light-bg': '#f9fafb',
                        'dark-bg': '#111827',
                        'dark-card': '#1f2937',
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Raleway', sans-serif; }
        .heading-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-light-bg dark:bg-dark-bg text-gray-900 dark:text-white">
    
    <!-- Admin Sidebar -->
    <div class="relative min-h-screen lg:flex">
        <aside class="w-64 bg-white dark:bg-black border-r border-gray-200 dark:border-gray-800 lg:sticky lg:top-0 lg:h-screen">
            <div class="p-6 border-b border-gray-200 dark:border-gray-800">
                <h1 class="heading-font text-2xl text-gold">Admin Panel</h1>
            </div>
            
            <nav class="p-6 space-y-2">
                <a href="admin-dashboard.html" class="block px-4 py-2 rounded hover:bg-gray-100 dark:hover:bg-gray-900">Dashboard</a>
                <a href="admin-artists.html" class="block px-4 py-2 rounded hover:bg-gray-100 dark:hover:bg-gray-900">Artists</a>
                <a href="admin-products.html" class="block px-4 py-2 rounded hover:bg-gray-100 dark:hover:bg-gray-900">Products</a>
                <a href="admin-services.html" class="block px-4 py-2 rounded hover:bg-gray-100 dark:hover:bg-gray-900">Services</a>
                <a href="admin-orders.html" class="block px-4 py-2 rounded hover:bg-gray-100 dark:hover:bg-gray-900">Orders</a>
                <a href="admin-gallery-management.html" class="block px-4 py-2 rounded hover:bg-gray-100 dark:hover:bg-gray-900">Gallery</a>
                <div class="pt-4 border-t border-gray-200 dark:border-gray-800">
                    <button id="logout-btn" class="w-full text-left px-4 py-2 rounded hover:bg-gray-100 dark:hover:bg-gray-900 text-red-600" title="Logout">Logout</button>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8">
            

            <main class="p-6 flex-1 overflow-y-auto">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                    <h3 class="text-2xl font-semibold heading-font">Artists</h3>
                    <button id="add-artist-btn" class="w-full sm:w-auto bg-gold text-black font-bold py-2 px-4 rounded-md hover:opacity-90 transition-opacity duration-200 flex items-center justify-center">
                        <i data-feather="plus" class="w-4 h-4 mr-2"></i>Add Artist
                    </button>
                </div>

                <div class="bg-light-card dark:bg-dark-card p-6 rounded-lg shadow-md border border-gray-200 dark:border-gray-700">
                    <h4 class="text-xl font-semibold heading-font mb-4">Artist List</h4>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700" id="artist-table">
                            <thead class="bg-gray-50 dark:bg-gray-800/50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Image</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Name</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Bio Preview</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Created</th>
                                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="bg-light-card dark:bg-dark-card divide-y divide-gray-200 dark:divide-gray-800" id="artist-tbody">
                                <!-- Artist Items will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add/Edit Artist Modal -->
    <div id="artist-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-40 hidden">
        <div class="bg-light-card dark:bg-dark-card p-8 rounded-lg shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto transform transition-all">
            <div class="flex justify-between items-center mb-6">
                <h4 id="modal-title" class="text-2xl font-bold heading-font">Add Artist</h4>
                <button id="close-modal" class="text-gray-500 hover:text-gray-800 dark:hover:text-gray-200 text-3xl">&times;</button>
            </div>
            <form id="artist-form" enctype="multipart/form-data">
                <input type="hidden" id="artist-id" name="artist_id">
                <div class="space-y-4">
                    <div>
                        <label for="artist-name" class="block text-sm font-medium mb-1">Artist Name <span class="text-red-500">*</span></label>
                        <input type="text" id="artist-name" name="name" required class="w-full bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-gold">
                    </div>
                    <div>
                        <label for="artist-bio" class="block text-sm font-medium mb-1">Biography</label>
                        <textarea id="artist-bio" name="bio" rows="6" placeholder="Tell us about the artist..." class="w-full bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-gold"></textarea>
                    </div>
                    <div>
                        <label for="artist-image" class="block text-sm font-medium mb-1">Artist Image</label>
                        <input type="file" id="artist-image" name="image" accept="image/*" class="w-full bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-gold">
                        <p class="text-xs text-gray-500 mt-1">Max file size: 5MB. Supported formats: JPG, PNG, GIF, WEBP</p>
                    </div>
                    <div id="image-preview-container" class="hidden">
                        <label class="block text-sm font-medium mb-1">Current Image</label>
                        <img id="current-image" src="" alt="Artist" class="w-32 h-32 object-cover rounded-lg border border-gray-300 dark:border-gray-600">
                    </div>
                    <div id="new-image-preview-container" class="hidden">
                        <label class="block text-sm font-medium mb-1">New Image Preview</label>
                        <img id="new-image-preview" src="" alt="Preview" class="w-32 h-32 object-cover rounded-lg border border-gray-300 dark:border-gray-600">
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" id="cancel-btn" class="bg-gray-300 dark:bg-gray-700 text-light-text dark:text-dark-text font-bold py-2 px-6 rounded-md hover:bg-gray-400 dark:hover:bg-gray-600 transition-colors duration-200">Cancel</button>
                    <button type="submit" class="bg-gold text-black font-bold py-2 px-6 rounded-md hover:opacity-90 transition-opacity duration-200">Save Artist</button>
                </div>
            </form>
        <script>
        feather.replace();

        let artists = [];
        let editingArtistId = null;

        // Load artists
        async function loadArtists() {
            try {
                console.log('Fetching artists from API...');
                const response = await fetch('api/artists.php');
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Received data:', data);
                
                if (data.success) {
                    artists = data.artists;
                    console.log('Loaded', artists.length, 'artists');
                    renderArtists();
                } else {
                    console.error('API returned error:', data.message);
                    alert('Failed to load artists: ' + data.message);
                }
            } catch (error) {
                console.error('Error loading artists:', error);
                alert('Error loading artists: ' + error.message);
            }
        }

        // Render artists table
        function renderArtists() {
            const tbody = document.getElementById('artist-tbody');
            
            if (artists.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">No artists found. Add your first artist!</td></tr>';
                return;
            }
            
            tbody.innerHTML = artists.map(artist => {
                const bioPreview = artist.bio ? (artist.bio.substring(0, 100) + '...') : 'No bio provided';
                const imagePath = artist.image_path ? `${artist.image_path}` : 'https://via.placeholder.com/150';
                const createdDate = new Date(artist.created_at).toLocaleDateString();
                
                return `
                    <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <img src="${imagePath}" alt="${artist.name}" class="w-16 h-16 object-cover rounded-lg">
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap font-semibold">${artist.name}</td>
                        <td class="px-6 py-4 text-sm text-gray-600 dark:text-gray-400">${bioPreview}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${createdDate}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-right">
                            <button onclick="editArtist(${artist.id})" class="text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 mr-3">
                                <i data-feather="edit-2" class="w-4 h-4"></i>
                            </button>
                            <button onclick="updateArtistImage(${artist.id})" class="text-green-600 dark:text-green-400 hover:text-green-800 dark:hover:text-green-300 mr-3" title="Update Image">
                                <i data-feather="image" class="w-4 h-4"></i>
                            </button>
                            <button onclick="deleteArtist(${artist.id})" class="text-red-600 dark:text-red-400 hover:text-red-800 dark:hover:text-red-300">
                                <i data-feather="trash-2" class="w-4 h-4"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
            
            feather.replace();
        }

        // Open modal for adding artist
        document.getElementById('add-artist-btn').addEventListener('click', () => {
            editingArtistId = null;
            document.getElementById('modal-title').textContent = 'Add Artist';
            document.getElementById('artist-form').reset();
            document.getElementById('artist-id').value = '';
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('new-image-preview-container').classList.add('hidden');
            document.getElementById('artist-modal').classList.remove('hidden');
        });

        // Close modal
        document.getElementById('close-modal').addEventListener('click', closeModal);
        document.getElementById('cancel-btn').addEventListener('click', closeModal);

        function closeModal() {
            document.getElementById('artist-modal').classList.add('hidden');
            editingArtistId = null;
        }

        // Edit artist
        async function editArtist(id) {
            try {
                const response = await fetch(`api/artists.php?id=${id}`);
                const data = await response.json();
                
                if (data.success) {
                    editingArtistId = id;
                    const artist = data.artist;
                    
                    document.getElementById('modal-title').textContent = 'Edit Artist';
                    document.getElementById('artist-id').value = artist.id;
                    document.getElementById('artist-name').value = artist.name;
                    document.getElementById('artist-bio').value = artist.bio || '';
                    
                    if (artist.image_path) {
                        document.getElementById('current-image').src = artist.image_path;
                        document.getElementById('image-preview-container').classList.remove('hidden');
                    } else {
                        document.getElementById('image-preview-container').classList.add('hidden');
                    }
                    
                    document.getElementById('new-image-preview-container').classList.add('hidden');
                    document.getElementById('artist-modal').classList.remove('hidden');
                } else {
                    alert('Failed to load artist: ' + data.message);
                }
            } catch (error) {
                console.error('Error loading artist:', error);
                alert('Error loading artist');
            }
        }

        // Preview new image
        document.getElementById('artist-image').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('new-image-preview').src = e.target.result;
                    document.getElementById('new-image-preview-container').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // Submit form
        document.getElementById('artist-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const artistId = document.getElementById('artist-id').value;

            // If we are editing, add the artist_id to the form data
            if (artistId) {
                formData.append('artist_id', artistId);
            }
            
            try {
                const response = await fetch('api/artists.php', {
                    method: 'POST', // Always POST, backend will check for artist_id
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert(artistId ? 'Artist updated successfully!' : 'Artist created successfully!');
                    closeModal();
                    loadArtists();
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                console.error('Error saving artist:', error);
                alert('Error saving artist');
            }
        });

        // Update artist image only
        async function updateArtistImage(id) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const formData = new FormData();
                formData.append('artist_id', id);
                formData.append('image', file);
                
                try {
                    const response = await fetch('api/artist-image.php', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        alert('Artist image updated successfully!');
                        loadArtists();
                    } else {
                        alert('Error: ' + result.message);
                    }
                } catch (error) {
                    console.error('Error updating image:', error);
                    alert('Error updating image');
                }
            };
            
            input.click();
        }

        // Delete artist
        async function deleteArtist(id) {
            if (!confirm('Are you sure you want to delete this artist? This action cannot be undone.')) {
                return;
            }
            
            try {
                const response = await fetch('api/artists.php', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({ id: id })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('Artist deleted successfully!');
                    loadArtists();
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                console.error('Error deleting artist:', error);
                alert('Error deleting artist');
            }
        }

        // Load artists on page load
        loadArtists();
    </script>

        </main>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/setup.js"></script>
    <script>
        // Check if user is admin, redirect if not
        if (!AuthManager.isAdmin()) {
            window.location.href = '../user/login_page.html';
        }
        
        // Setup logout button
        document.getElementById('logout-btn').addEventListener('click', () => {
            AuthManager.logout();
            window.location.href = '../user/index.html';
        });
        
        feather.replace();
    </script>
</body>
</html>
