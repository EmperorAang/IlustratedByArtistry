        <!-- Main Content -->

<div class="bg-light-card dark:bg-dark-card p-6 rounded-lg shadow-md border border-gray-200 dark:border-gray-700">
    <div class="flex justify-between items-center mb-4">
        <h4 class="text-xl font-semibold heading-font">Service Management</h4>
        <button id="add-service-btn" class="bg-gold text-black font-bold py-2 px-4 rounded-lg hover:bg-yellow-400 transition duration-300 flex items-center">
            <i data-feather="plus" class="w-5 h-5 mr-2"></i> Add New Service
        </button>
    </div>
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700" id="services-table">
            <thead class="bg-gray-50 dark:bg-gray-800/50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Name</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Category</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Sub-Category</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Price</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Actions</th>
                </tr>
            </thead>

<!-- Add/Edit Service Modal -->
<div id="service-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-40 hidden">
    <div class="bg-light-card dark:bg-dark-card p-8 rounded-lg shadow-2xl w-full max-w-2xl transform transition-all">
        <form id="service-form" enctype="multipart/form-data">
            <input type="hidden" id="service-id" name="id">
            <div class="flex justify-between items-center mb-6">
                <h4 id="modal-title" class="text-2xl font-bold heading-font">Add New Service</h4>
                <button type="button" id="close-modal" class="text-gray-500 hover:text-gray-800 dark:hover:text-gray-200">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label for="service-name" class="block text-sm font-medium mb-1">Service Name</label>
                    <input type="text" id="service-name" name="name" class="w-full bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-gold" required>
                </div>
                <div>
                    <label for="service-description" class="block text-sm font-medium mb-1">Description</label>
                    <textarea id="service-description" name="description" rows="4" class="w-full bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-gold"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="service-price" class="block text-sm font-medium mb-1">Price (ZAR or text)</label>
                        <input type="text" id="service-price" name="price" class="w-full bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-gold" required>
                    </div>
                    <div>
                        <label for="service-category" class="block text-sm font-medium mb-1">Category</label>
                        <select id="service-category" name="category" class="w-full bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-gold">
                            <option value="">Select a category</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label for="service-subcategory" class="block text-sm font-medium mb-1">Sub-Category</label>
                     <select id="service-subcategory" name="subcategory" class="w-full bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-gold">
                        <option value="">Select a sub-category</option>
                    </select>
                </div>
            </div>
            <div class="mt-6 flex justify-end space-x-4">
                <button type="button" id="cancel-btn" class="bg-gray-200 dark:bg-gray-600 text-black dark:text-white font-bold py-2 px-4 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500">Cancel</button>
                <button type="submit" id="save-btn" class="bg-gold text-black font-bold py-2 px-4 rounded-lg hover:bg-yellow-400">Save Service</button>
            </div>
        </form>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const API_URL = 'api/services.html';
    const CATEGORIES_API_URL = 'api/service-categories.html';
    const servicesTableBody = document.querySelector('#services-table tbody');
    const modal = document.getElementById('service-modal');
    const closeModalBtn = document.getElementById('close-modal');
    const addServiceBtn = document.getElementById('add-service-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const serviceForm = document.getElementById('service-form');
    const modalTitle = document.getElementById('modal-title');
    const categorySelect = document.getElementById('service-category');
    const subcategorySelect = document.getElementById('service-subcategory');

    let categoriesData = {};

    const formatCurrency = (amount) => {
        // Handle non-numeric values like "Full Price"
        if (isNaN(amount)) {
            return amount;
        }
        return new Intl.NumberFormat('en-ZA', { style: 'currency', currency: 'ZAR' }).format(amount);
    };

    const loadCategories = async () => {
        try {
            const response = await fetch(CATEGORIES_API_URL);
            if (!response.ok) throw new Error('Failed to load categories');
            categoriesData = await response.json();
            
            categorySelect.innerHTML = '<option value="">Select a category</option>';
            for (const category in categoriesData) {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categorySelect.appendChild(option);
            }
        } catch (error) {
            console.error('Error loading categories:', error);
        }
    };

    const updateSubcategories = (selectedCategory, selectedSubcategory = null) => {
        subcategorySelect.innerHTML = '<option value="">Select a sub-category</option>';
        if (selectedCategory && categoriesData[selectedCategory]) {
            categoriesData[selectedCategory].forEach(subcategory => {
                const option = document.createElement('option');
                option.value = subcategory;
                option.textContent = subcategory;
                subcategorySelect.appendChild(option);
            });
        }
        if (selectedSubcategory) {
            subcategorySelect.value = selectedSubcategory;
        }
    };

    categorySelect.addEventListener('change', () => {
        updateSubcategories(categorySelect.value);
    });

    const createTableRow = (service) => `
        <tr data-id="${service.id}">
            <td class="px-6 py-4 whitespace-nowrap">
                <div class="text-sm font-medium">${service.name}</div>
                <div class="text-sm text-gray-500 truncate max-w-xs">${service.description}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm">
                <div>${service.category}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm">
                ${service.subcategory || ''}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold">${formatCurrency(service.price)}</td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <button class="text-gray-400 hover:text-gold p-2 edit-btn" data-id="${service.id}"><i data-feather="edit" class="w-5 h-5"></i></button>
                <button class="text-gray-400 hover:text-red-500 p-2 delete-btn" data-id="${service.id}"><i data-feather="trash-2" class="w-5 h-5"></i></button>
            </td>
        </tr>
    `;

    const renderTable = (services) => {
        if (!services || services.length === 0) {
            servicesTableBody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-500">No services found. Click "Add New Service" to begin.</td></tr>';
            return;
        }
        servicesTableBody.innerHTML = services.map(createTableRow).join('');
        feather.replace();
    };

    const loadServices = async () => {
        try {
            const response = await fetch(API_URL);
            if (!response.ok) {
                 const errorText = await response.text();
                 throw new Error(`HTTP error! status: ${response.status}, response: ${errorText}`);
            }
            const services = await response.json();
            if (services.error) throw new Error(services.error);
            renderTable(services);
        } catch (error) {
            console.error('Error loading services:', error);
            servicesTableBody.innerHTML = `<tr><td colspan="5" class="text-center py-4">Error loading services: ${error.message}</td></tr>`;
        }
    };

    const openModal = (service = null) => {
        serviceForm.reset();
        categorySelect.value = '';
        updateSubcategories('');

        if (service) {
            modalTitle.textContent = 'Edit Service';
            document.getElementById('service-id').value = service.id;
            document.getElementById('service-name').value = service.name;
            document.getElementById('service-description').value = service.description;
            document.getElementById('service-price').value = service.price;

            // Set category and populate subcategories
            categorySelect.value = service.category;
            updateSubcategories(service.category, service.subcategory);

        } else {
            modalTitle.textContent = 'Add New Service';
            document.getElementById('service-id').value = '';
        }
        modal.classList.remove('hidden');
    };

    const closeModal = () => {
        modal.classList.add('hidden');
    };

    const handleFormSubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(serviceForm);
        const id = formData.get('id');
        
        // To handle updates (PUT) with file uploads, we must use POST.
        // We can add a hidden field to tell the backend it's an update.
        if (id) {
            formData.append('_method', 'PUT');
        }

        try {
            const response = await fetch(API_URL, {
                method: 'POST', // Always use POST for FormData with files
                body: formData
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Server responded with ${response.status}: ${errorText}`);
            }

            const result = await response.json();
            if (result.error) throw new Error(result.error);
            
            loadServices();
            closeModal();

        } catch (error) {
            console.error('Error saving service:', error);
            alert(`Failed to save service. ${error.message}`);
        }
    };

    const handleDelete = async (id) => {
        if (!confirm('Are you sure you want to delete this service?')) return;

        try {
            const response = await fetch(`${API_URL}?id=${id}`, { method: 'DELETE' });
            
            if (response.status === 204 || response.ok) {
                loadServices();
            } else {
                 const errorText = await response.text();
                throw new Error(`Failed to delete. Server responded with ${response.status}: ${errorText}`);
            }
        } catch (error) {
            console.error('Error deleting service:', error);
            alert(`Failed to delete service. ${error.message}`);
        }
    };

    addServiceBtn.addEventListener('click', () => openModal());
    closeModalBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    serviceForm.addEventListener('submit', handleFormSubmit);

    servicesTableBody.addEventListener('click', async (e) => {
        const editBtn = e.target.closest('.edit-btn');
        const deleteBtn = e.target.closest('.delete-btn');

        if (editBtn) {
            const id = editBtn.dataset.id;
            try {
                const response = await fetch(`${API_URL}?id=${id}`);
                const service = await response.json();
                if (service.error) throw new Error(service.error);
                openModal(service);
            } catch (error) {
                alert('Could not fetch service details for editing.');
            }
        }

        if (deleteBtn) {
            const id = deleteBtn.dataset.id;
            handleDelete(id);
        }
    });

    const initializePage = async () => {
        await loadCategories();
        await loadServices();
    };

    initializePage();
});
</script>


<script src="../assets/js/admin.js"></script>
